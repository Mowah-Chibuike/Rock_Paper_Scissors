<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Rock, Paper, Scissors Game{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="{{ url_for('static', path='css/layout.css') }}" rel="stylesheet" />
    {% block page_styles %}{% endblock %}
  </head>
  <body>
    <header>
      <h1>🎮 Rock Paper Scissors</h1>
    </header>

    <main class="container">{% block content %}{% endblock %}</main>

    <footer>
      <p>&copy; 2026 Rock, Paper, Scissors Game. Built with FastAPI & Love.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
